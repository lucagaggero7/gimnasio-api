name: Build and deploy ASP.Net Core app to Azure Web App - gimnasio-api

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Cache de NuGet
      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # 3️⃣ Setup .NET
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      # 4️⃣ Publish directamente (sin build)
      - name: Publish .NET app
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      # 5️⃣ Comprimir el artifact
      - name: Compress published app
        run: tar -czf myapp.tar.gz -C "${{env.DOTNET_ROOT}}/myapp" .

      # 6️⃣ Upload artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: myapp.tar.gz

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # 1️⃣ Download artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      # 2️⃣ Extract artifact
      - name: Extract artifact
        run: tar -xzf myapp.tar.gz

      # 3️⃣ Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_62F333CD5F1744EBA3E1612686C1A281 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8C0A6D9241CD43B192A15DA487878C7D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_3939984263F94D1FAFE7F13F7BF2A281 }}

      # 4️⃣ Deploy apuntando al folder correcto
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gimnasio-api'
          slot-name: 'Production'
          package: ./myapp
